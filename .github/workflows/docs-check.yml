name: Docs Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run docs health check
        run: python tools/ci/check_docs.py
